<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello from the swarm</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <div class="orb"></div>
      <p class="kicker">peer-to-peer &middot; ephemeral</p>
      <h1>Hello, <span id="who">world</span>.</h1>
      <p class="sub" id="sub">
        This page isn't on a server. It's coming straight from someone's browser tab.
      </p>
      <button id="cta">Say hi back</button>
    </main>
    <script src="app.js"></script>
  </body>
</html>
