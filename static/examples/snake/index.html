<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neon Snake</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        gap: 1rem;
        background: #06070c;
        color: #e8ecf6;
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 1rem;
        touch-action: none;
      }
      h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
        font-weight: 600;
      }
      .hud {
        display: flex;
        gap: 1.5rem;
        color: #8b96ad;
        font-size: 0.9rem;
        font-variant-numeric: tabular-nums;
      }
      .hud b {
        color: #5eead4;
      }
      canvas {
        background:
          radial-gradient(circle at 50% 0%, rgba(94, 234, 212, 0.08), transparent 60%),
          #0a0c14;
        border: 1px solid #1b2130;
        border-radius: 14px;
        box-shadow: 0 20px 80px rgba(94, 234, 212, 0.12);
        max-width: 92vmin;
        width: 480px;
        height: auto;
        aspect-ratio: 1;
      }
      .hint {
        color: #6b7690;
        font-size: 0.82rem;
        margin: 0;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #06070c;
        background: #5eead4;
        border: 0;
        border-radius: 10px;
        padding: 0.6rem 1.2rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Neon Snake</h1>
    <div class="hud">
      <span>score <b id="score">0</b></span><span>best <b id="best">0</b></span>
    </div>
    <canvas id="c" width="480" height="480"></canvas>
    <p class="hint">
      Arrow keys or WASD &middot; swipe on touch &middot; <button id="reset">restart</button>
    </p>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const N = 20; // grid cells per side
      const CELL = canvas.width / N;
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      // Guarded: in the sandboxed IDE preview there's no storage access; hosted for real there is.
      const store = {
        get: (k) => {
          try {
            return localStorage.getItem(k);
          } catch {
            return null;
          }
        },
        set: (k, v) => {
          try {
            localStorage.setItem(k, v);
          } catch { /* sandboxed */ }
        },
      };
      let best = Number(store.get("snake-best") || "0");
      bestEl.textContent = best;

      let snake, dir, nextDir, food, score, alive, tickMs, acc, last;

      function reset() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        alive = true;
        tickMs = 130;
        acc = 0;
        last = performance.now();
        placeFood();
        scoreEl.textContent = "0";
      }

      function placeFood() {
        while (true) {
          const f = { x: (Math.random() * N) | 0, y: (Math.random() * N) | 0 };
          if (!snake.some((s) => s.x === f.x && s.y === f.y)) {
            food = f;
            return;
          }
        }
      }

      function setDir(x, y) {
        // no reversing directly onto yourself
        if (x === -dir.x && y === -dir.y) return;
        nextDir = { x, y };
      }

      addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (k === "arrowup" || k === "w") setDir(0, -1);
        else if (k === "arrowdown" || k === "s") setDir(0, 1);
        else if (k === "arrowleft" || k === "a") setDir(-1, 0);
        else if (k === "arrowright" || k === "d") setDir(1, 0);
        else return;
        e.preventDefault();
      });

      let touch = null;
      canvas.addEventListener("touchstart", (e) => {
        touch = e.touches[0];
      }, { passive: true });
      canvas.addEventListener("touchmove", (e) => {
        if (!touch) return;
        const t = e.touches[0];
        const dx = t.clientX - touch.clientX, dy = t.clientY - touch.clientY;
        if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
        else setDir(0, dy > 0 ? 1 : -1);
        touch = null;
      }, { passive: true });

      document.getElementById("reset").addEventListener("click", reset);

      function step() {
        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        if (
          head.x < 0 || head.y < 0 || head.x >= N || head.y >= N ||
          snake.some((s) => s.x === head.x && s.y === head.y)
        ) {
          alive = false;
          best = Math.max(best, score);
          store.set("snake-best", best);
          bestEl.textContent = best;
          return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score++;
          scoreEl.textContent = score;
          tickMs = Math.max(60, tickMs - 3);
          placeFood();
        } else {
          snake.pop();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // food
        ctx.fillStyle = "#ff7ccb";
        ctx.shadowColor = "#ff7ccb";
        ctx.shadowBlur = 16;
        roundRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6, 6);
        // snake
        for (let i = snake.length - 1; i >= 0; i--) {
          const t = 1 - i / snake.length;
          ctx.fillStyle = `hsl(${168 + t * 40}, 80%, ${45 + t * 20}%)`;
          ctx.shadowColor = "#5eead4";
          ctx.shadowBlur = i === 0 ? 20 : 8;
          roundRect(snake[i].x * CELL + 2, snake[i].y * CELL + 2, CELL - 4, CELL - 4, 6);
        }
        ctx.shadowBlur = 0;
        if (!alive) {
          ctx.fillStyle = "rgba(6,7,12,0.72)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#e8ecf6";
          ctx.textAlign = "center";
          ctx.font = "600 28px system-ui, sans-serif";
          ctx.fillText("Game over", canvas.width / 2, canvas.height / 2 - 6);
          ctx.font = "16px system-ui, sans-serif";
          ctx.fillStyle = "#8b96ad";
          ctx.fillText("press restart or any arrow key", canvas.width / 2, canvas.height / 2 + 24);
        }
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
      }

      addEventListener("keydown", (e) => {
        if (!alive && e.key.toLowerCase().startsWith("arrow")) reset();
      });

      function loop(now) {
        const dt = now - last;
        last = now;
        if (alive) {
          acc += dt;
          while (acc >= tickMs) {
            step();
            acc -= tickMs;
          }
        }
        draw();
        requestAnimationFrame(loop);
      }

      reset();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
